repos:

  - repo: local
    hooks:

      - id: check-spacing
        name: Check spacing rules
        entry: pipenv run python tools/check_spacing.py --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff
        name: Ruff
        entry: pipenv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: true
